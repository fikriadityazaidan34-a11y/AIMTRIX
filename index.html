let currentCategory = "Semua";

function row(name, val) {
    return `
    <div class="row">
        <div class="labels">
            <span>${name}</span>
            <span>${val}</span>
        </div>
        <div class="track">
            <div class="fill" style="width:${val/2}%"></div>
        </div>
    </div>
    `;
}

function render(data) {
    const output = document.getElementById("output");
    document.getElementById("count").innerHTML = `<i class="fa-solid fa-mobile-screen"></i> ${data.length} Device`;

    if (data.length === 0) {
        output.innerHTML = `<div class="empty"><i class="fa-solid fa-circle-exclamation" style="font-size:30px"></i><br><br>Device tidak ditemukan</div>`;
        return;
    }

    output.innerHTML = data.map(d => `
    <div class="card">
        <div class="top">
            <div class="title"><i class="fa-solid fa-microchip" style="font-size:16px; color:#fff"></i> ${d.name}</div>
            <div class="brand">${d.type}</div>
        </div>
        <div class="tag">${d.tag}</div>
        ${row("General", d.look)}
        ${row("Red Dot", d.red)}
        ${row("2x Scope", d.s2x)}
        ${row("4x Scope", d.s4x)}
        ${row("Sniper", d.sniper)}
        ${row("Free Look", d.free)}
        <div class="footer">
            <div class="footer-left"><i class="fa-solid fa-sliders"></i> DPI Recommendation</div>
            <div class="dpi">${d.dpi}</div>
        </div>
    </div>
    `).join("");
}

function filterData() {
    const q = document.getElementById("search").value.toLowerCase();
    const filtered = db.filter(item => {
        const searchMatch = item.name.toLowerCase().includes(q);
        const categoryMatch = currentCategory === "Semua" || item.type === currentCategory;
        return searchMatch && categoryMatch;
    });
    render(filtered);
}

function setCategory(cat, el) {
    currentCategory = cat;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    
    el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
    
    filterData();
}

            margin-bottom: 25px; display: flex; align-items: center; gap: 15px; cursor: pointer;
        }
        .menu-item i { width: 25px; color: #888; }

        /* Modal About Style */
        .about-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .about-content {
            background: #141414; border: 1px solid #222; width: 100%;
            max-width: 350px; border-radius: 30px; padding: 30px; text-align: center;
            animation: zoomIn 0.3s ease;
        }
        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .dev-img {
            width: 70px; height: 70px; background: #fff; border-radius: 20px;
            margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
            font-size: 30px; color: #000;
        }
        .about-title { font-size: 20px; font-weight: 900; }
        .about-ver { color: #888; font-size: 12px; margin-bottom: 20px; }
        .about-info { background: #1c1c1c; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: left; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; }
        .info-row span:first-child { color: #777; }
        
        .wa-channel {
            background: #fff; color: #000; padding: 12px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; font-weight: 800; text-decoration: none; margin-bottom: 15px;
        }
    `;
    const styleSheet = document.createElement("style");
    styleSheet.innerText = combinedStyles;
    document.head.appendChild(styleSheet);

    // 2. Gabungan HTML (Menu + Modal)
    const combinedHTML = `
        <div class="menu-btn" id="openMenu"><i class="fa-solid fa-bars-staggered"></i></div>
        <div class="menu-overlay" id="overlay"></div>
        
        <div class="side-menu" id="sideMenu">
            <div class="menu-item" onclick="location.reload()"><i class="fa-solid fa-house"></i> Home Dashboard</div>
            <a href="https://wa.me/+62895603290359" class="menu-item"><i class="fa-solid fa-paper-plane"></i> Request Device</a>
            <div class="menu-item" id="btnAbout"><i class="fa-solid fa-circle-info"></i> About Version</div>
            <div class="menu-item" style="color: #ff4d4d; margin-top: 30px;" id="closeMenu"><i class="fa-solid fa-xmark"></i> Close Menu</div>
        </div>

        <div class="about-modal" id="aboutModal">
            <div class="about-content">
                <div class="dev-img"><i class="fa-solid fa-code"></i></div>
                <div class="about-title">AIMTRIX</div>
                <div class="about-ver">Ultimate Sensitivity Database</div>
                <div class="about-info">
                    <div class="info-row"><span>Developer</span><span>ZinZen</span></div>
                    <div class="info-row"><span>Version</span><span>v2.5.0 (2026)</span></div>
                    <div class="info-row"><span>Status</span><span>Active / Smooth</span></div>
                </div>
                <a href="https://whatsapp.com/channel/linkanda" target="_blank" class="wa-channel">
                    <i class="fa-brands fa-whatsapp"></i> Join WA Channel
                </a>
                <span style="color:#555; font-size:12px; cursor:pointer; font-weight:700" id="closeAbout">Tutup Panel</span>
            </div>
        </div>
    `;
    document.body.insertAdjacentHTML('beforeend', combinedHTML);

    // 3. Logika Fungsional
    const btnOpen = document.getElementById("openMenu");
    const btnClose = document.getElementById("closeMenu");
    const sideMenu = document.getElementById("sideMenu");
    const overlay = document.getElementById("overlay");
    const btnAbout = document.getElementById("btnAbout");
    const modalAbout = document.getElementById("aboutModal");
    const btnCloseAbout = document.getElementById("closeAbout");

    function toggleMenu(show) {
        sideMenu.classList.toggle("active", show);
        overlay.style.display = show ? "block" : "none";
    }

    // Event Klik Menu
    btnOpen.onclick = () => toggleMenu(true);
    btnClose.onclick = () => toggleMenu(false);
    overlay.onclick = () => toggleMenu(false);

    // Event Klik About
    btnAbout.onclick = () => {
        toggleMenu(false); // Tutup menu samping dulu
        modalAbout.style.display = "flex";
    };

    // Event Tutup Modal
    btnCloseAbout.onclick = () => modalAbout.style.display = "none";
    
    // Klik di luar konten modal untuk menutup
    modalAbout.onclick = (e) => {
        if(e.target === modalAbout) modalAbout.style.display = "none";
    };

})();

</script>
